<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GHS Checker PRO</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e14; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px; }
  .app { width: 100%; max-width: 1100px; background: #0d1117; border: 1px solid #21262d; border-radius: 14px; padding: 24px; color: #e6edf3; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; color: #e6edf3; }
  .logo svg { width: 28px; height: 28px; fill: #e6edf3; }
  .pro-badge { background: linear-gradient(135deg,#7c3aed,#5b21b6); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 5px; letter-spacing: 0.8px; }
  .status-text { font-size: 13px; color: #8b949e; font-style: italic; }
  .grid { display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
  @media(max-width:760px){ .grid { grid-template-columns: 1fr; } }
  .panel { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 18px; }
  .panel-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: #e6edf3; margin-bottom: 14px; }
  .panel-subtitle { font-size: 12px; color: #8b949e; margin-left: auto; }
  textarea { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 7px; color: #e6edf3; font-size: 13px; font-family: 'Consolas', monospace; padding: 10px 12px; resize: none; height: 220px; line-height: 1.9; outline: none; transition: border-color .2s; }
  textarea:focus { border-color: #58a6ff; }
  .token-section { margin-top: 14px; }
  .token-label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #8b949e; margin-bottom: 6px; }
  .token-input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 7px; color: #8b949e; font-size: 12px; padding: 8px 12px; font-family: 'Consolas', monospace; outline: none; transition: border-color .2s; }
  .token-input:focus { border-color: #58a6ff; color: #e6edf3; }
  .btn-row { display: flex; gap: 8px; margin-top: 14px; align-items: center; }
  .btn-start { flex: 1; background: linear-gradient(135deg,#238636,#1a6e2a); border: none; color: #fff; font-size: 13px; font-weight: 600; padding: 10px; border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: opacity .2s; }
  .btn-start:hover:not(:disabled) { opacity: .85; }
  .btn-start:disabled { background: #1b2d1e; color: #4b6b50; cursor: not-allowed; }
  .btn-stop { background: #21262d; border: 1px solid #30363d; color: #e6edf3; font-size: 13px; font-weight: 500; padding: 10px 16px; border-radius: 7px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .2s; }
  .btn-stop:hover:not(:disabled) { background: #30363d; }
  .btn-stop:disabled { color: #8b949e; cursor: not-allowed; }
  .btn-clear { background: transparent; border: 1px solid #30363d; color: #8b949e; cursor: pointer; padding: 10px 12px; border-radius: 7px; transition: color .2s, background .2s; }
  .btn-clear:hover { color: #f85149; background: #2d1218; border-color: #da3633; }
  .results-section { display: flex; flex-direction: column; gap: 14px; }
  .result-group { background: #0d1117; border: 1px solid #30363d; border-radius: 10px; overflow: hidden; }
  .result-group-header { display: flex; align-items: center; gap: 8px; padding: 11px 14px; background: #161b22; border-bottom: 1px solid #30363d; }
  .result-group-title { font-size: 13px; font-weight: 600; color: #e6edf3; flex: 1; }
  .count-badge { font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 20px; min-width: 28px; text-align: center; }
  .count-badge.pro { background: #2d1b69; border: 1px solid #7c3aed; color: #c4b5fd; }
  .count-badge.live { background: #0d2e16; border: 1px solid #238636; color: #56d364; }
  .count-badge.notfound { background: #2d1218; border: 1px solid #da3633; color: #f85149; }
  .result-items { max-height: 280px; overflow-y: auto; }
  .result-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid #161b22; transition: background .1s; cursor: default; }
  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: #161b22; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; background: #21262d; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; position: relative; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .avatar-dot { width: 11px; height: 11px; border-radius: 50%; position: absolute; bottom: 0; right: 0; border: 2px solid #0d1117; }
  .avatar-dot.live { background: #56d364; }
  .user-info { flex: 1; min-width: 0; }
  .username { font-size: 13px; font-weight: 600; color: #e6edf3; display: flex; align-items: center; gap: 6px; }
  .user-meta { font-size: 11px; color: #8b949e; margin-top: 3px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .meta-item { display: flex; align-items: center; gap: 3px; }
  .age-pill { background: #21262d; border: 1px solid #30363d; color: #58a6ff; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 20px; white-space: nowrap; }
  .err-code { font-size: 11px; color: #f85149; background: #2d1218; border: 1px solid #da3633; padding: 2px 8px; border-radius: 5px; font-family: monospace; font-weight: 600; }
  .progress-bar-wrap { height: 3px; background: #21262d; margin: 0; }
  .progress-bar { height: 100%; background: linear-gradient(90deg,#238636,#58a6ff); border-radius: 2px; transition: width .3s ease; width: 0%; }
  .empty-state { padding: 22px 14px; text-align: center; color: #8b949e; font-size: 12px; }
  .action-icons { display: flex; gap: 4px; }
  .icon-btn { background: transparent; border: none; color: #8b949e; cursor: pointer; padding: 5px; border-radius: 5px; transition: color .15s, background .15s; }
  .icon-btn:hover { color: #e6edf3; background: #21262d; }
  .stat-row { display: flex; gap: 12px; margin-bottom: 10px; }
  .stat-box { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; }
  .stat-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
  .stat-val { font-size: 20px; font-weight: 700; }
  .stat-val.pro { color: #c4b5fd; }
  .stat-val.live { color: #56d364; }
  .stat-val.notfound { color: #f85149; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      GHS Checker <span class="pro-badge">PRO</span>
    </div>
    <div class="status-text" id="status-text">Ready to check...</div>
  </div>

  <!-- Stat row -->
  <div class="stat-row">
    <div class="stat-box"><div class="stat-label">⭐ Pro</div><div class="stat-val pro" id="stat-pro">0</div></div>
    <div class="stat-box"><div class="stat-label">✅ Live</div><div class="stat-val live" id="stat-live">0</div></div>
    <div class="stat-box"><div class="stat-label">❌ Not Found</div><div class="stat-val notfound" id="stat-notfound">0</div></div>
  </div>

  <div class="grid">
    <!-- LEFT PANEL -->
    <div class="panel">
      <div class="panel-title">
        <svg viewBox="0 0 16 16" fill="#8b949e" width="15" height="15"><path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5v-3zm8 0A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5v-3zm-8 8A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5v-3zm8 0A1.5 1.5 0 0 1 10.5 9h3A1.5 1.5 0 0 1 15 10.5v3A1.5 1.5 0 0 1 13.5 15h-3A1.5 1.5 0 0 1 9 13.5v-3z"/></svg>
        Input List
        <span class="panel-subtitle">Support: Username only</span>
      </div>
      <textarea id="username-input" placeholder="torvalds&#10;gvanrossum&#10;addyosmani&#10;sindresorhus&#10;..."></textarea>
      <div class="token-section">
        <div class="token-label">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="#8b949e"><path d="M8 1a2 2 0 0 1 2 2v.5h1A1.5 1.5 0 0 1 12.5 5v8a1.5 1.5 0 0 1-1.5 1.5h-6A1.5 1.5 0 0 1 3.5 13V5A1.5 1.5 0 0 1 5 3.5h1V3a2 2 0 0 1 2-2zm0 1a1 1 0 0 0-1 1v.5h2V3a1 1 0 0 0-1-1zm2.5 3.5h-5V13h6V5h-1z"/></svg>
          GitHub Token (Optional)
        </div>
        <input class="token-input" id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxx (Increases rate limit)" />
      </div>
      <div class="btn-row">
        <button class="btn-start" id="btn-start" onclick="startCheck()">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M11.596 8.697l-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/></svg>
          Start Check
        </button>
        <button class="btn-stop" id="btn-stop" onclick="stopCheck()" disabled>
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3.5h6A1.5 1.5 0 0 1 12.5 5v6A1.5 1.5 0 0 1 11 12.5H5A1.5 1.5 0 0 1 3.5 11V5A1.5 1.5 0 0 1 5 3.5z"/></svg>
          Stop
        </button>
        <button class="btn-clear" onclick="clearAll()" title="Clear all">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
        </button>
      </div>
      <div class="progress-bar-wrap" style="margin-top:14px;border-radius:4px;">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="results-section">

      <!-- PRO -->
      <div class="result-group" id="group-pro">
        <div class="result-group-header">
          <span style="color:#c4b5fd;font-size:15px;">★</span>
          <span class="result-group-title">Pro Account</span>
          <div class="action-icons">
            <button class="icon-btn" onclick="copyGroup('pro')" title="Copy usernames">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/></svg>
            </button>
            <button class="icon-btn" onclick="downloadGroup('pro')" title="Download">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
            </button>
          </div>
          <span class="count-badge pro" id="count-pro">0</span>
        </div>
        <div class="result-items" id="list-pro"><div class="empty-state">No pro accounts found yet</div></div>
      </div>

      <!-- LIVE -->
      <div class="result-group" id="group-live">
        <div class="result-group-header">
          <span style="color:#56d364;font-size:15px;">✓</span>
          <span class="result-group-title">Live</span>
          <div class="action-icons">
            <button class="icon-btn" onclick="copyGroup('live')" title="Copy usernames">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/></svg>
            </button>
            <button class="icon-btn" onclick="downloadGroup('live')" title="Download">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
            </button>
          </div>
          <span class="count-badge live" id="count-live">0</span>
        </div>
        <div class="result-items" id="list-live"><div class="empty-state">No live accounts found yet</div></div>
      </div>

      <!-- NOT FOUND -->
      <div class="result-group" id="group-notfound">
        <div class="result-group-header">
          <span style="color:#f85149;font-size:15px;">✕</span>
          <span class="result-group-title">Not Found</span>
          <div class="action-icons">
            <button class="icon-btn" onclick="copyGroup('notfound')" title="Copy usernames">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/></svg>
            </button>
            <button class="icon-btn" onclick="downloadGroup('notfound')" title="Download">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
            </button>
          </div>
          <span class="count-badge notfound" id="count-notfound">0</span>
        </div>
        <div class="result-items" id="list-notfound"><div class="empty-state">No not-found accounts yet</div></div>
      </div>

    </div>
  </div>
</div>

<script>
let running = false, stopFlag = false, checked = 0, total = 0;
let results = { pro: [], live: [], notfound: [] };

// ─── Helpers ────────────────────────────────────────────────────────────────

function formatDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  return d.toISOString().split('T')[0];
}

function daysAgo(str) {
  if (!str) return null;
  const ms = Date.now() - new Date(str).getTime();
  return Math.floor(ms / 86400000);
}

function ageLabel(days) {
  if (days === null) return '';
  if (days >= 365) {
    const yrs = (days / 365).toFixed(1);
    return `${yrs}y old`;
  }
  if (days >= 30) {
    const mo = Math.floor(days / 30);
    return `${mo}mo old`;
  }
  return `${days}d old`;
}

function updateCount(group) {
  const n = results[group].length;
  document.getElementById('count-' + group).textContent = n;
  document.getElementById('stat-' + group).textContent = n;
}

// ─── Render ─────────────────────────────────────────────────────────────────

function renderItem(group, data) {
  const list = document.getElementById('list-' + group);
  const empty = list.querySelector('.empty-state');
  if (empty) empty.remove();

  const item = document.createElement('div');
  item.className = 'result-item';

  if (group === 'notfound') {
    item.innerHTML = `
      <div class="avatar" style="background:#2d1218;border:1.5px solid #da3633;">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="#f85149"><path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"/></svg>
      </div>
      <div class="user-info">
        <div class="username">${data.login}</div>
        <div class="user-meta"><span>Account not found on GitHub</span></div>
      </div>
      <span class="err-code">404</span>`;
  } else {
    const isPro = group === 'pro';
    const days = daysAgo(data.created_at);
    const ageTxt = ageLabel(days);
    const updDays = daysAgo(data.updated_at);
    const updTxt = updDays !== null ? `Updated ${updDays}d ago` : '';

    item.innerHTML = `
      <div class="avatar" style="border:2px solid ${isPro ? '#7c3aed' : '#238636'};">
        <img src="${data.avatar_url}" alt="${data.login}" onerror="this.style.display='none'" loading="lazy"/>
        ${!isPro ? '<div class="avatar-dot live"></div>' : ''}
      </div>
      <div class="user-info">
        <div class="username">
          ${data.login}
          ${isPro ? '<span class="pro-badge" style="font-size:10px;padding:1px 6px;">PRO</span>' : ''}
          ${ageTxt ? `<span class="age-pill">${ageTxt}</span>` : ''}
        </div>
        <div class="user-meta">
          <span class="meta-item">
            <svg viewBox="0 0 16 16" fill="#8b949e" style="width:11px;height:11px;"><path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0zM1.5 8a6.5 6.5 0 1 1 13 0 6.5 6.5 0 0 1-13 0z"/><path d="M7 4a.5.5 0 0 1 .5.5v3.25l2.25 1.3a.5.5 0 0 1-.5.866L6.75 8.25a.5.5 0 0 1-.25-.433V4.5A.5.5 0 0 1 7 4z"/></svg>
            ID: ${data.id}
          </span>
          <span class="meta-item">
            <svg viewBox="0 0 16 16" fill="#8b949e" style="width:11px;height:11px;"><path d="M14 0H2a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2zM1 3.857C1 3.384 1.448 3 2 3h12c.552 0 1 .384 1 .857v10.286c0 .473-.448.857-1 .857H2c-.552 0-1-.384-1-.857V3.857z"/><path d="M6.5 7a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-9 3a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/></svg>
            Created: ${formatDate(data.created_at)}
          </span>
          <span class="meta-item">
            <svg viewBox="0 0 16 16" fill="#8b949e" style="width:11px;height:11px;"><path d="M11.5 2a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm-3 2a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm-3 2a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm-3 2a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/></svg>
            Updated: ${formatDate(data.updated_at)}
          </span>
          ${data.followers > 0 ? `<span class="meta-item">
            <svg viewBox="0 0 16 16" fill="#8b949e" style="width:11px;height:11px;"><path d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1H7zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path fill-rule="evenodd" d="M5.216 14A2.238 2.238 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.325 6.325 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1h4.216z"/><path d="M4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z"/></svg>
            ${data.followers}
          </span>` : ''}
          ${data.public_repos > 0 ? `<span class="meta-item">
            <svg viewBox="0 0 16 16" fill="#8b949e" style="width:11px;height:11px;"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8V1.5Z"/></svg>
            ${data.public_repos}
          </span>` : ''}
        </div>
      </div>`;
  }

  list.appendChild(item);
  // Scroll to bottom
  list.scrollTop = list.scrollHeight;
}

// ─── API Call ────────────────────────────────────────────────────────────────

async function checkUser(username, token) {
  const headers = { 'Accept': 'application/vnd.github+json' };
  if (token) headers['Authorization'] = `token ${token}`;
  try {
    const r = await fetch(`https://api.github.com/users/${username}`, { headers });
    if (r.status === 404) return { status: 'notfound', login: username };
    if (r.status === 403) {
      // Rate limited
      return { status: 'error', login: username, code: 403, msg: 'Rate limited' };
    }
    if (!r.ok) return { status: 'error', login: username, code: r.status };
    const data = await r.json();

    // PRO detection: GitHub API exposes plan only for authenticated own user,
    // so for public checks we use heuristics:
    // 1. data.plan exists (rare, needs auth)
    // 2. data.type === 'Organization' → skip
    // We'll mark as 'pro' only if plan is confirmed, otherwise 'live'
    let isPro = false;
    if (data.plan && data.plan.name && data.plan.name.toLowerCase() !== 'free') {
      isPro = true;
    }
    return { status: isPro ? 'pro' : 'live', ...data };
  } catch (e) {
    return { status: 'error', login: username };
  }
}

// ─── Start/Stop/Clear ────────────────────────────────────────────────────────

async function startCheck() {
  const raw = document.getElementById('username-input').value;
  const token = document.getElementById('token-input').value.trim();
  const usernames = [...new Set(raw.split('\n').map(u => u.trim()).filter(Boolean))];
  if (!usernames.length) return;

  results = { pro: [], live: [], notfound: [] };
  ['pro','live','notfound'].forEach(g => {
    document.getElementById('list-' + g).innerHTML = '';
    document.getElementById('count-' + g).textContent = '0';
    document.getElementById('stat-' + g).textContent = '0';
  });

  checked = 0; total = usernames.length; stopFlag = false; running = true;
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  document.getElementById('progress-bar').style.width = '0%';

  for (const u of usernames) {
    if (stopFlag) break;
    document.getElementById('status-text').textContent = `Checking ${u}... (${checked}/${total})`;
    const result = await checkUser(u, token);
    checked++;
    document.getElementById('progress-bar').style.width = Math.round((checked / total) * 100) + '%';

    if (result.status === 'notfound') {
      results.notfound.push(result);
      renderItem('notfound', result);
      updateCount('notfound');
    } else if (result.status === 'pro') {
      results.pro.push(result);
      renderItem('pro', result);
      updateCount('pro');
    } else if (result.status === 'live') {
      results.live.push(result);
      renderItem('live', result);
      updateCount('live');
    } else if (result.status === 'error') {
      // Show as notfound-like entry with error code
      result.login = result.login || u;
      const list = document.getElementById('list-notfound');
      const empty = list.querySelector('.empty-state');
      if (empty) empty.remove();
      const item = document.createElement('div');
      item.className = 'result-item';
      item.innerHTML = `
        <div class="avatar" style="background:#21262d;border:1.5px solid #30363d;">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="#8b949e"><path d="M7.938 2.016A.13.13 0 0 1 8.002 2a.13.13 0 0 1 .063.016.146.146 0 0 1 .054.057l6.857 11.667c.036.06.035.124.002.183a.163.163 0 0 1-.054.06.116.116 0 0 1-.066.017H1.146a.115.115 0 0 1-.066-.017.163.163 0 0 1-.054-.06.176.176 0 0 1 .002-.183L7.884 2.073a.147.147 0 0 1 .054-.057zm1.044-.45a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566z"/><path d="M7.002 12a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 5.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995z"/></svg>
        </div>
        <div class="user-info">
          <div class="username">${result.login}</div>
          <div class="user-meta"><span>${result.msg || 'Error fetching account'}</span></div>
        </div>
        <span class="err-code">${result.code || 'ERR'}</span>`;
      list.appendChild(item);
    }

    // Delay to avoid rate limit
    await new Promise(res => setTimeout(res, token ? 100 : 300));
  }

  running = false;
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  const done = stopFlag ? '⛔ Stopped' : '✅ Done';
  document.getElementById('status-text').textContent =
    `${done} — ${checked} checked • ${results.pro.length} Pro • ${results.live.length} Live • ${results.notfound.length} Not Found`;
}

function stopCheck() {
  stopFlag = true;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('status-text').textContent = 'Stopping...';
}

function clearAll() {
  document.getElementById('username-input').value = '';
  results = { pro: [], live: [], notfound: [] };
  ['pro','live','notfound'].forEach(g => {
    document.getElementById('list-' + g).innerHTML = `<div class="empty-state">No results yet</div>`;
    document.getElementById('count-' + g).textContent = '0';
    document.getElementById('stat-' + g).textContent = '0';
  });
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('status-text').textContent = 'Ready to check...';
}

// ─── Copy / Download ─────────────────────────────────────────────────────────

function copyGroup(group) {
  const lines = results[group].map(r => r.login).join('\n');
  if (!lines) return;
  navigator.clipboard.writeText(lines).then(() => {
    document.getElementById('status-text').textContent = `Copied ${results[group].length} ${group} accounts!`;
    setTimeout(() => {
      if (!running)
        document.getElementById('status-text').textContent = 'Ready to check...';
    }, 2000);
  }).catch(() => {
    prompt('Copy manually:', lines);
  });
}

function downloadGroup(group) {
  const lines = results[group].map(r => r.login).join('\n');
  if (!lines) return;
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(lines);
  a.download = `ghs_${group}_accounts.txt`;
  a.click();
}
